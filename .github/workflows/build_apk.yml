name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Accept Android Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          flutter config --no-analytics
          flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos 2>&1 | tee /tmp/analyze.log
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --debug 2>&1 | tee /tmp/error.log; exit ${PIPESTATUS[0]}

      - name: Show error summary
        if: failure()
        run: |
          echo "=== BUILD ERROR ==="
          tail -100 /tmp/error.log
          echo "=== END OF ERROR ==="

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: /tmp/error.log

      - name: Upload analyze log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyze-log
          path: /tmp/analyze.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shuai-jiujiu
          path: build/app/outputs/flutter-apk/app-debug.apk

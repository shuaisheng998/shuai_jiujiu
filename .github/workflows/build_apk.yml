name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Accept Android Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          flutter config --no-analytics
          flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos 2>&1 | tee /tmp/analyze.log
        continue-on-error: true

      - name: Build APK
        run: |
          set -o pipefail
          flutter build apk --debug 2>&1 | tee /tmp/build.log

      - name: Verify APK exists
        run: |
          ls -la build/app/outputs/flutter-apk/
          if [ ! -f build/app/outputs/flutter-apk/app-debug.apk ]; then
            echo "ERROR: APK not found!"
            exit 1
          fi
          echo "APK found, size: $(ls -lh build/app/outputs/flutter-apk/app-debug.apk | awk '{print $5}')"

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shuai-jiujiu
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
